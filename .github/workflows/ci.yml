name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare runtime data directory
        run: mkdir -p data

      - name: Prepare database
        run: PYTHONPATH=. python -c "from pathlib import Path; from app.storage import init_db; init_db(Path('data/app.sqlite3'))"

      - name: Run tests
        env:
          EMBEDDING_PROVIDER: fake
        run: PYTHONPATH=. python -m pytest

